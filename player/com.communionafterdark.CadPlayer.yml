app-id: com.communionafterdark.CadPlayer
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: cad-player

finish-args:
  # Display
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  # Audio
  - --socket=pulseaudio
  # Archive on NAS or home directory (read-only — player never writes to archive)
  - --filesystem=home:ro
  # GPU access for GStreamer vaapi (harmless if absent)
  - --device=dri
  # MPRIS media keys
  - --talk-name=org.mpris.MediaPlayer2.cad-player
  - --own-name=org.mpris.MediaPlayer2.cad-player

modules:
  - name: cad-player
    buildsystem: simple
    build-commands:
      # PyGObject, GTK4, libadwaita, GStreamer + gst-python are all provided
      # by org.gnome.Platform//46 — no extra Python deps needed.
      - pip3 install --prefix=/app --no-build-isolation .
    sources:
      - type: dir
        path: .
